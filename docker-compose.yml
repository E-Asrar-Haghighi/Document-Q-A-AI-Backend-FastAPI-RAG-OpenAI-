version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: document-qa-ai-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
      - qdrant
    volumes:
      - ./app:/app/app
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: document-qa-ai-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant
    container_name: document-qa-ai-qdrant
    ports:
      - "6333:6333"
    restart: unless-stopped